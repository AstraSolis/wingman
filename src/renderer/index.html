<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingman - 游戏攻略助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 顶部控制栏 -->
  <div id="toolbar" class="toolbar">
    <!-- 地址栏与历史模块 -->
    <div class="url-bar">
      <button id="homeBtn" class="icon-btn" title="返回主页">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </button>
      <input type="text" id="urlInput" data-i18n-placeholder="toolbar.urlPlaceholder" placeholder="输入攻略网址..." spellcheck="false">
      <button id="addFavBtn" data-i18n-title="toolbar.addFavTitle" title="收藏当前页面">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      </button>
      <button id="loadBtn" data-i18n-title="toolbar.loadBtn" title="加载网页">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 12 12 5 19 12"></polyline>
          <line x1="12" y1="19" x2="12" y2="5"></line>
        </svg>
      </button>
    </div>

    <!-- 控制按钮组 -->
    <div class="controls">
      <!-- 透明度滑块 -->
      <div class="opacity-control" data-i18n-title="toolbar.opacityTitle" title="透明度调节">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" opacity="0.6">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <input type="range" id="opacitySlider" min="30" max="100" value="85" step="5">
        <span id="opacityValue" class="opacity-value">85%</span>
      </div>

      <!-- 穿透状态指示器 -->
      <button id="clickThroughBtn" class="icon-btn" data-i18n-title="toolbar.clickThroughTitle" title="切换点击穿透 (Ctrl+Shift+T)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path>
          <path d="M13 13l6 6"></path>
        </svg>
      </button>

      <!-- 最小化到托盘 -->
      <button id="hideBtn" class="icon-btn" data-i18n-title="toolbar.hideTitle" title="隐藏窗口 (Ctrl+Shift+H)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- 主页容器 -->
  <div id="homeView" class="home-view hidden">
    <!-- 动态背景图 -->
    <div class="home-bg" id="homeBg"></div>
    <div class="home-bg-overlay"></div>

    <div class="home-content">
      <!-- 大时钟 -->
      <div class="home-clock" id="homeClock">00:00</div>
      
      <!-- 搜索栏 -->
      <div class="home-search">
        <input type="text" id="homeUrlInput" data-i18n-placeholder="home.searchPlaceholder" placeholder="输入网址或搜索内容..." spellcheck="false">
        <button id="homeGoBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- 底部 Dock 栏 -->
    <div class="home-dock-container">
      <div class="home-dock">
        <button id="showFavBtn" class="dock-btn" data-i18n-title="home.favorites" title="收藏夹">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        </button>
        <button id="showHistoryBtn" class="dock-btn" data-i18n-title="home.history" title="历史记录">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Webview 容器 -->
  <div id="webviewContainer" class="webview-container hidden">
    <webview id="guideWebview"
             src=""
             style="width:100%; height:100%;"
             allowpopups></webview>

    <!-- 加载状态指示器 -->
    <div id="loadingIndicator" class="loading-indicator hidden">
      <div class="loading-spinner"></div>
      <span data-i18n="webview.loading">加载中...</span>
    </div>

    <!-- 错误信息 -->
    <div id="errorOverlay" class="error-overlay hidden">
      <div class="error-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
        <p id="errorMessage" data-i18n="webview.loadFailed">网页加载失败</p>
        <button id="retryBtn" class="retry-btn" data-i18n="webview.retry">重试</button>
      </div>
    </div>
  </div>

  <!-- OSD 提示 -->
  <div id="osd" class="osd hidden"></div>

  <!-- 模态框容器 -->
  <div id="listModal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">列表标题</h2>
        <button id="closeModalBtn" class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
      <div id="modalList" class="modal-list">
        <!-- 列表项目渲染区域 -->
      </div>
    </div>
  </div>

  <script src="../common/i18nUtils.js"></script>
  <script src="webviewHandler.js"></script>
  <script src="ui.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
